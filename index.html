<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Escala de Cultos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ══════════════════════════════════════════════
   RESET & TOKENS
══════════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --blue:   #0A84FF;
  --indigo: #5E5CE6;
  --green:  #30D158;
  --orange: #FF9F0A;
  --red:    #FF453A;
  --pink:   #FF375F;
  --gray3:  #48484A;
  --gray4:  #3A3A3C;
  --gray5:  #2C2C2E;
  --gray6:  #1C1C1E;
  --bg:     #000;
  --text:   #FFF;
  --text2:  rgba(255,255,255,.60);
  --text3:  rgba(255,255,255,.30);
  --glass:  rgba(255,255,255,.07);
  --gb:     rgba(255,255,255,.11);
  --blur:   blur(48px) saturate(200%);
  --rL:     22px;
  --rXL:    28px;
  --ease:   cubic-bezier(.4,0,.2,1);
  --st:     env(safe-area-inset-top, 0px);
  --sb:     env(safe-area-inset-bottom, 0px);
}

html, body { height: 100%; overscroll-behavior: none; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── BUG FIX: utility .hidden class ──────────────────────
   .hidden esconde qualquer elemento via display:none.
   .screen.hidden tem especificidade maior, sobrescreve para
   manter display:flex e usar opacity/transform p/ animação. */
.hidden { display: none !important; }
.screen.hidden {
  display: flex !important;        /* mantém layout p/ transição */
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px) scale(.98);
}

/* ── Orbs background ── */
.orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.orbs span {
  position: absolute; border-radius: 50%;
  filter: blur(100px); opacity: .45;
  animation: drift 20s ease-in-out infinite alternate;
}
.orbs span:nth-child(1) { width:520px;height:520px;background:#002d80;top:-180px;left:-160px;animation-duration:17s; }
.orbs span:nth-child(2) { width:400px;height:400px;background:#38006b;top:40%;right:-120px;animation-duration:23s;animation-delay:-7s; }
.orbs span:nth-child(3) { width:360px;height:360px;background:#001a33;bottom:-80px;left:25%;animation-duration:14s;animation-delay:-3s; }
@keyframes drift { to { transform: translate(30px,24px) scale(1.06); } }

/* ══════════════════════════════════════════════
   SCREENS
══════════════════════════════════════════════ */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  transition: opacity .3s var(--ease), transform .35s var(--ease);
}

/* ══════════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════════ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(var(--st) + 14px) 18px 14px;
  background: rgba(0,0,0,.55);
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border-bottom: 1px solid var(--gb);
  position: relative; z-index: 50; flex-shrink: 0;
}
.topbar-brand { display: flex; align-items: center; gap: 10px; }
.brand-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(145deg,#1a70ff,#0050cc);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,122,255,.4); flex-shrink: 0;
}
.brand-icon svg { width:18px;height:18px; }
.topbar h1 { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }

/* Admin badge */
.admin-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  background: rgba(10,132,255,.20); border: 1px solid rgba(10,132,255,.40);
  font-size: 12px; font-weight: 700; color: var(--blue);
}
.admin-badge svg { width:11px;height:11px; }

/* Icon button */
.btn-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--glass); border: 1px solid var(--gb);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .2s, transform .15s; flex-shrink: 0;
}
.btn-icon:hover  { background: rgba(255,255,255,.14); }
.btn-icon:active { transform: scale(.90); }
.btn-icon svg    { width:16px;height:16px; }

/* ══════════════════════════════════════════════
   SCROLL BODY
══════════════════════════════════════════════ */
.scroll-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--sb) + 100px);
}
.scroll-body::-webkit-scrollbar { display: none; }

/* ══════════════════════════════════════════════
   GLASS
══════════════════════════════════════════════ */
.glass {
  background: var(--glass);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--gb);
  border-radius: var(--rL);
}

/* ══════════════════════════════════════════════
   PAGE LAYOUT
══════════════════════════════════════════════ */
.page {
  padding: 18px 14px;
  max-width: 680px; margin: 0 auto; width: 100%;
  display: flex; flex-direction: column; gap: 22px;
}

/* ══════════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════════ */
.cal-card { overflow: hidden; }
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--gb);
}
.cal-month { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
.cal-nav-btns { display: flex; gap: 6px; }
.cal-nav-btn {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,.08); border: 1px solid var(--gb);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background .2s, transform .15s;
}
.cal-nav-btn:hover  { background: rgba(255,255,255,.16); }
.cal-nav-btn:active { transform: scale(.88); }
.cal-nav-btn svg { width:14px;height:14px; }

.cal-body { padding: 10px 14px 14px; }
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7,1fr);
  margin-bottom: 4px;
}
.cal-wd {
  text-align: center; font-size: 10px; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: .7px; padding: 3px 0;
}
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-day {
  aspect-ratio: 1; border-radius: 9px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding: 4px 2px 2px;
  transition: background .15s; cursor: default;
}
.cal-day.clickable { cursor: pointer; }
.cal-day.clickable:hover  { background: rgba(255,255,255,.09); }
.cal-day.clickable:active { background: rgba(255,255,255,.15); transform: scale(.93); }
.cal-day.other .cal-num   { color: var(--text3); }

.cal-num {
  font-size: 13px; font-weight: 500; color: var(--text2);
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.cal-day.today .cal-num {
  background: var(--blue); color: #fff; font-weight: 700;
}
.cal-dots { display: flex; gap: 2px; justify-content: center; margin-top: 2px; }
.cal-dot  { width: 4px; height: 4px; border-radius: 50%; }

/* ══════════════════════════════════════════════
   SECTION
══════════════════════════════════════════════ */
.sec-title { font-size: 19px; font-weight: 800; letter-spacing: -.5px; }
.sec-sub   { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* ══════════════════════════════════════════════
   EVENT CARDS
══════════════════════════════════════════════ */
.events-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }

.event-card {
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: transform .25s var(--ease), background .2s;
  animation: slideUp .35s var(--ease) both;
}
@keyframes slideUp { from { opacity:0;transform:translateY(14px); } to { opacity:1;transform:none; } }

.event-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--ac, var(--blue)); border-radius: 2px 0 0 2px;
}
.event-card:hover  { transform: translateX(2px); background: rgba(255,255,255,.08); }
.event-card:active { transform: scale(.98); }

.ev-icon {
  width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.ev-icon svg { width:20px;height:20px; }

.ev-info { flex: 1; min-width: 0; }
.ev-title { font-size: 15px; font-weight: 700; letter-spacing: -.2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ev-meta  { display: flex; align-items: center; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
.ev-pill  {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 20px;
  font-size: 11px; font-weight: 600; color: var(--text2);
  background: rgba(255,255,255,.09);
}
.ev-pill svg { width:9px;height:9px; }

.ev-chev svg { width:15px;height:15px; }

.empty-state {
  text-align:center; padding:36px 16px; color:var(--text3);
  display:flex; flex-direction:column; align-items:center; gap:10px;
}
.empty-state svg { width:36px;height:36px; opacity:.4; }
.empty-state p { font-size:14px; }

/* ══════════════════════════════════════════════
   FAB
══════════════════════════════════════════════ */
.fab {
  position: fixed;
  bottom: calc(var(--sb) + 22px);
  right: 18px; z-index: 100;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--blue); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(10,132,255,.55);
  transition: opacity .3s, transform .2s, box-shadow .2s;
  /* BUG FIX: hidden via opacity, not display, so .hidden class is NOT used */
  opacity: 0; pointer-events: none;
}
.fab.show       { opacity: 1; pointer-events: all; }
.fab:hover      { transform: scale(1.08); box-shadow: 0 12px 40px rgba(10,132,255,.65); }
.fab:active     { transform: scale(.94); }
.fab svg        { width:22px;height:22px; }

/* ══════════════════════════════════════════════
   DETAIL SCREEN
══════════════════════════════════════════════ */
#screen-detail .topbar { justify-content: flex-start; gap: 10px; }
.btn-back {
  display: flex; align-items: center; gap: 3px;
  padding: 7px 11px; border-radius: 10px;
  background: var(--glass); border: 1px solid var(--gb);
  color: var(--blue); font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background .2s; flex-shrink: 0;
}
.btn-back:hover { background: rgba(255,255,255,.12); }
.btn-back svg   { width:14px;height:14px; }
.detail-topbar-title {
  font-size:16px;font-weight:700;letter-spacing:-.2px;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Admin bar in detail */
.admin-detail-bar {
  display: flex; gap: 10px;
  padding: 12px 14px;
  max-width: 680px; margin: 0 auto; width: 100%;
  flex-shrink: 0;
}
.btn-edit, .btn-del {
  flex: 1; padding: 12px; border-radius: 12px;
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; border: none;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: opacity .2s, transform .15s;
}
.btn-edit:active, .btn-del:active { transform: scale(.96); }
.btn-edit { background: rgba(10,132,255,.18); border: 1px solid rgba(10,132,255,.30); color: var(--blue); }
.btn-del  { background: rgba(255,69,58,.14);  border: 1px solid rgba(255,69,58,.28);  color: var(--red); }
.btn-edit:hover { background: rgba(10,132,255,.28); }
.btn-del:hover  { background: rgba(255,69,58,.26); }
.btn-edit svg, .btn-del svg { width:15px;height:15px; }

/* Hero */
.detail-hero { padding: 22px; position: relative; overflow: hidden; }
.detail-hero::before {
  content:''; position:absolute; top:0;left:0;right:0;height:3px;
  background: var(--hc, var(--blue));
}
.hero-type {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  border: 1px solid; margin-bottom: 12px;
}
.hero-title { font-size: 22px; font-weight: 800; letter-spacing: -.5px; line-height: 1.2; margin-bottom: 6px; }
.hero-desc  { font-size: 13px; color: var(--text2); line-height: 1.5; margin-bottom: 14px; }
.hero-chips { display: flex; gap: 8px; flex-wrap: wrap; }
.hero-chip  {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px; border-radius: 10px;
  background: rgba(255,255,255,.07); border: 1px solid var(--gb);
  font-size: 13px; color: var(--text2); font-weight: 500;
}
.hero-chip svg { width:13px;height:13px; }

/* Escala */
.escala-card { padding: 18px; }
.escala-card h2 { font-size: 15px; font-weight: 700; letter-spacing: -.2px; margin-bottom: 12px; }
.escala-list { display: flex; flex-direction: column; gap: 2px; }
.escala-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 12px; border-radius: 11px;
  transition: background .15s;
}
.escala-row:hover { background: rgba(255,255,255,.06); }
.escala-ico {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.escala-ico svg { width:17px;height:17px; }
.escala-texts { flex: 1; min-width: 0; }
.escala-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 2px; }
.escala-name  { font-size: 14px; font-weight: 600; }
.escala-empty { font-size: 13px; color: var(--text3); font-style: italic; }

/* Funcao colors */
.fi-dirigente     { background: rgba(10,132,255,.18);  color: #5ba8ff; }
.fi-pregador      { background: rgba(94,92,230,.18);   color: #a48bff; }
.fi-louvor        { background: rgba(255,159,10,.18);  color: #ffb830; }
.fi-acolhimento   { background: rgba(48,209,88,.18);   color: #4edd7e; }
.fi-projecao_live { background: rgba(255,69,58,.18);   color: #ff6b62; }
.fi-marketing     { background: rgba(255,55,95,.18);   color: #ff6688; }
.fi-kids          { background: rgba(90,200,250,.18);  color: #7dd8fc; }
.fi-tecnica       { background: rgba(142,142,147,.18); color: #aaaaae; }

/* ══════════════════════════════════════════════
   LOGIN PANEL (bottom sheet / centered modal)
══════════════════════════════════════════════ */
.panel-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.70);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  /* BUG FIX: usando opacity+pointer-events, não .hidden */
  opacity: 0; pointer-events: none;
  transition: opacity .3s var(--ease);
  display: flex; align-items: flex-end; justify-content: center;
}
.panel-overlay.open { opacity: 1; pointer-events: all; }

.login-panel {
  width: 100%; max-height: 90vh; overflow-y: auto;
  background: var(--gray6);
  border-radius: 26px 26px 0 0;
  border-top: 1px solid var(--gb);
  padding: 8px 22px calc(var(--sb) + 30px);
  transform: translateY(100%);
  transition: transform .4s var(--ease);
}
.panel-overlay.open .login-panel { transform: translateY(0); }

@media (min-width: 560px) {
  .panel-overlay { align-items: center; }
  .login-panel {
    width: 400px; max-height: 85vh;
    border-radius: 26px; border: 1px solid var(--gb);
    padding: 28px;
    transform: scale(.94) translateY(20px);
  }
  .panel-overlay.open .login-panel { transform: scale(1) translateY(0); }
}

.panel-handle {
  width: 34px; height: 4px; border-radius: 2px;
  background: var(--gray3); margin: 0 auto 22px;
}
@media (min-width: 560px) { .panel-handle { display: none; } }

.login-brand {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; margin-bottom: 24px; text-align: center;
}
.login-brand-icon {
  width: 58px; height: 58px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 14px 40px rgba(0,122,255,.4);
}
.login-brand-icon svg { width:26px;height:26px; }
.login-brand h2 { font-size: 19px; font-weight: 800; letter-spacing: -.4px; }
.login-brand p  { font-size: 13px; color: var(--text2); }

/* Fields */
.lfield { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
.lfield label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; }
.lfield-wrap { position: relative; }
.lfield-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px; pointer-events: none;
}
.lfield input {
  width: 100%; padding: 13px 14px 13px 40px;
  background: rgba(255,255,255,.07); border: 1px solid var(--gb);
  border-radius: 12px; color: var(--text); font-size: 15px;
  font-family: inherit; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.lfield input::placeholder { color: var(--text3); }
.lfield input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,132,255,.22); }

.login-err { font-size: 13px; color: var(--red); text-align: center; min-height: 16px; margin-bottom: 6px; }

.btn-submit {
  width: 100%; padding: 14px;
  background: var(--blue); border: none; border-radius: 13px;
  color: #fff; font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
  box-shadow: 0 8px 26px rgba(10,132,255,.42);
  transition: background .2s, transform .15s;
}
.btn-submit:hover  { background: #0070EF; }
.btn-submit:active { transform: scale(.97); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; }

.btn-logout-p {
  width: 100%; padding: 13px; margin-top: 10px;
  background: rgba(255,69,58,.12); border: 1px solid rgba(255,69,58,.28);
  border-radius: 13px; color: var(--red); font-size: 15px; font-weight: 700;
  font-family: inherit; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 7px;
  transition: background .2s;
}
.btn-logout-p:hover { background: rgba(255,69,58,.22); }
.btn-logout-p svg { width:16px;height:16px; }

/* ══════════════════════════════════════════════
   MODAL ADD/EDIT
══════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  opacity: 0; pointer-events: none;
  transition: opacity .3s var(--ease);
  display: flex; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  width: 100%; max-height: 93vh; overflow-y: auto;
  background: var(--gray6);
  border-radius: 26px 26px 0 0;
  border-top: 1px solid var(--gb);
  padding: 8px 18px calc(var(--sb) + 26px);
  transform: translateY(100%);
  transition: transform .4s var(--ease);
}
.modal-overlay.open .modal { transform: translateY(0); }

@media (min-width: 560px) {
  .modal-overlay { align-items: center; }
  .modal {
    width: 500px; max-height: 88vh;
    border-radius: 26px; border: 1px solid var(--gb);
    padding: 26px;
    transform: scale(.94) translateY(20px);
  }
  .modal-overlay.open .modal { transform: scale(1) translateY(0); }
}

.modal-handle { width:34px;height:4px;border-radius:2px;background:var(--gray3);margin:0 auto 18px; }
@media(min-width:560px) { .modal-handle { display:none; } }

.modal-head { display:flex;align-items:center;justify-content:space-between;margin-bottom:18px; }
.modal-head h3 { font-size:19px;font-weight:800;letter-spacing:-.4px; }
.btn-x {
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.10);border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .2s;
}
.btn-x:hover { background:rgba(255,255,255,.18); }
.btn-x svg { width:14px;height:14px; }

.mfield { display:flex;flex-direction:column;gap:5px;margin-bottom:11px; }
.mfield label { font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px; }
.mfield input, .mfield select {
  width:100%;padding:11px 13px;
  background:rgba(255,255,255,.07);
  border:1px solid var(--gb);border-radius:11px;
  color:var(--text);font-size:14px;font-family:inherit;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.mfield select option { background:#2C2C2E; }
.mfield input:focus, .mfield select:focus {
  border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.20);
}
.mrow { display:grid;grid-template-columns:1fr 1fr;gap:10px; }
@media(max-width:420px) { .mrow { grid-template-columns:1fr; } }

.modal-sep { border:none;border-top:1px solid var(--gb);margin:14px 0; }
.modal-sec-title { font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px; }

.ef-list { display:flex;flex-direction:column;gap:9px; }
.ef-row  { display:flex;align-items:center;gap:10px; }
.ef-ico  { width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.ef-ico svg { width:15px;height:15px; }
.ef-lbl  { font-size:11px;font-weight:700;color:var(--text2);width:105px;flex-shrink:0;text-transform:uppercase;letter-spacing:.3px; }
.ef-row input {
  flex:1;padding:9px 11px;
  background:rgba(255,255,255,.07);border:1px solid var(--gb);
  border-radius:9px;color:var(--text);font-size:13px;
  font-family:inherit;outline:none;transition:border-color .2s;
}
.ef-row input:focus { border-color:var(--blue); }

.btn-save {
  width:100%;padding:14px;margin-top:14px;
  background:var(--blue);border:none;border-radius:13px;
  color:#fff;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:0 8px 22px rgba(10,132,255,.42);
  transition:background .2s,transform .15s;
}
.btn-save:hover  { background:#0070EF; }
.btn-save:active { transform:scale(.97); }
.btn-save:disabled { opacity:.5;cursor:not-allowed; }
.btn-save svg { width:16px;height:16px; }

/* ══════════════════════════════════════════════
   DELETE CONFIRM
══════════════════════════════════════════════ */
.confirm-overlay {
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,.80);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity .25s var(--ease);
}
.confirm-overlay.open { opacity:1;pointer-events:all; }

.confirm-box {
  width:100%;max-width:340px;
  background:var(--gray5);border:1px solid var(--gb);
  border-radius:24px;padding:26px 22px;
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;
  transform:scale(.88);transition:transform .3s var(--ease);
}
.confirm-overlay.open .confirm-box { transform:scale(1); }

.confirm-ico {
  width:52px;height:52px;border-radius:50%;
  background:rgba(255,69,58,.16);
  display:flex;align-items:center;justify-content:center;
}
.confirm-ico svg { width:24px;height:24px; }
.confirm-box h3 { font-size:17px;font-weight:800;letter-spacing:-.3px; }
.confirm-box p  { font-size:14px;color:var(--text2);line-height:1.5; }

.confirm-actions { display:flex;gap:9px;width:100%;margin-top:2px; }
.btn-cancel {
  flex:1;padding:12px;border-radius:11px;
  background:rgba(255,255,255,.10);border:1px solid var(--gb);
  color:var(--text);font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:background .2s;
}
.btn-cancel:hover { background:rgba(255,255,255,.17); }
.btn-confirm-del {
  flex:1;padding:12px;border-radius:11px;
  background:var(--red);border:none;
  color:#fff;font-size:15px;font-weight:700;font-family:inherit;
  cursor:pointer;transition:background .2s;
}
.btn-confirm-del:hover { background:#e03528; }

/* ── Toast ── */
.toast {
  position:fixed;top:calc(var(--st) + 68px);
  left:50%;transform:translateX(-50%) translateY(-8px);
  z-index:999; padding:9px 16px;border-radius:20px;
  background:rgba(36,36,38,.96);border:1px solid var(--gb);
  font-size:13px;font-weight:600;white-space:nowrap;
  opacity:0;pointer-events:none;transition:all .3s var(--ease);
}
.toast.show { opacity:1;transform:translateX(-50%) translateY(0); }

/* ── Spinner ── */
.spin {
  width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(255,255,255,.22);
  border-top-color:#fff;
  animation:sp .6s linear infinite;display:inline-block;
}
@keyframes sp { to { transform:rotate(360deg); } }
.loading-wrap { display:flex;justify-content:center;padding:36px; }
</style>
</head>
<body>

<div class="orbs"><span></span><span></span><span></span></div>
<div class="toast" id="toast"></div>

<!-- ══════════════════════════════════════════
     SCREEN: MAIN
══════════════════════════════════════════ -->
<div class="screen" id="screen-main">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg aria-hidden="true" style="width:18px;height:18px;stroke:#fff"><use href="#i-cross"/></svg>
      </div>
      <h1>Escala de Cultos</h1>
    </div>
    <div class="topbar-right">
      <!-- shown only when admin is logged in -->
      <div class="admin-badge hidden" id="admin-badge">
        <svg style="width:11px;height:11px"><use href="#i-shield-check"/></svg>
        Admin
      </div>
      <!-- lock icon → opens login panel -->
      <button class="btn-icon" id="btn-open-panel" title="Área administrativa" aria-label="Entrar como admin">
        <svg><use href="#i-user"/></svg>
      </button>
    </div>
  </div>

  <div class="scroll-body">
    <div class="page">

      <!-- ── Calendar ── -->
      <div class="glass cal-card">
        <div class="cal-header">
          <span class="cal-month" id="cal-label"></span>
          <div class="cal-nav-btns">
            <button class="cal-nav-btn" id="cal-prev" aria-label="Mês anterior">
              <svg><use href="#i-chev-l"/></svg>
            </button>
            <button class="cal-nav-btn" id="cal-next" aria-label="Próximo mês">
              <svg><use href="#i-chev-r"/></svg>
            </button>
          </div>
        </div>
        <div class="cal-body">
          <div class="cal-weekdays" id="cal-wd"></div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
      </div>

      <!-- ── Events this week ── -->
      <div>
        <div class="sec-title" id="ev-title">Esta semana</div>
        <div class="sec-sub"   id="ev-sub"></div>
        <div class="events-list" id="events-list">
          <div class="loading-wrap"><div class="spin"></div></div>
        </div>
      </div>

    </div>
  </div>

  <!-- FAB: only visible when admin -->
  <button class="fab" id="fab" aria-label="Novo culto">
    <svg><use href="#i-plus"/></svg>
  </button>
</div>

<!-- ══════════════════════════════════════════
     SCREEN: DETAIL
══════════════════════════════════════════ -->
<div class="screen hidden" id="screen-detail">
  <div class="topbar">
    <button class="btn-back" id="btn-back">
      <svg><use href="#i-chev-l"/></svg> Voltar
    </button>
    <span class="detail-topbar-title" id="detail-topbar-title"></span>
    <div style="width:60px"></div>
  </div>

  <!-- Admin bar (hidden until admin logs in) -->
  <div class="admin-detail-bar hidden" id="admin-detail-bar">
    <button class="btn-edit" id="btn-edit-detail">
      <svg><use href="#i-pencil"/></svg> Editar
    </button>
    <button class="btn-del" id="btn-del-detail">
      <svg><use href="#i-trash"/></svg> Apagar
    </button>
  </div>

  <div class="scroll-body">
    <div class="page" style="gap:14px">
      <div class="glass detail-hero" id="detail-hero"></div>
      <div class="glass escala-card" id="detail-escala">
        <div class="loading-wrap"><div class="spin"></div></div>
      </div>
    </div>

</div>

<!-- ══════════════════════════════════════════
     LOGIN PANEL
══════════════════════════════════════════ -->
<div class="panel-overlay" id="panel-overlay">
  <div class="login-panel">
    <div class="panel-handle"></div>

    <!-- Logged-out form -->
    <div id="pnl-out">
      <div class="login-brand">
        <div class="login-brand-icon" style="background:linear-gradient(145deg,#1a70ff,#004ecc)">
          <svg style="width:26px;height:26px;stroke:#fff"><use href="#i-lock"/></svg>
        </div>
        <h2>Acesso Admin</h2>
        <p>Apenas para equipe autorizada</p>
      </div>
      <div class="lfield">
        <label>E-mail</label>
        <div class="lfield-wrap">
          <svg class="lfield-icon" style="stroke:var(--text3)"><use href="#i-mail"/></svg>
          <input type="email" id="l-email" placeholder="seu@email.com" autocomplete="email"/>
        </div>
      </div>
      <div class="lfield">
        <label>Senha</label>
        <div class="lfield-wrap">
          <svg class="lfield-icon" style="stroke:var(--text3)"><use href="#i-key"/></svg>
          <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/>
        </div>
      </div>
      <p class="login-err" id="login-err"></p>
      <button class="btn-submit" id="btn-login">
        <svg style="width:16px;height:16px;stroke:#fff"><use href="#i-login"/></svg>
        Entrar
      </button>
    </div>

    <!-- Logged-in state -->
    <div id="pnl-in" class="hidden">
      <div class="login-brand">
        <div class="login-brand-icon" style="background:linear-gradient(145deg,#1a7a38,#0f4a22)">
          <svg style="width:26px;height:26px;stroke:#fff"><use href="#i-shield-check"/></svg>
        </div>
        <h2>Modo Admin</h2>
        <p id="pnl-email" style="font-size:13px;color:var(--text2)"></p>
      </div>
      <button class="btn-logout-p" id="btn-logout">
        <svg><use href="#i-logout"/></svg> Sair da conta
      </button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MODAL ADD/EDIT
══════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h3 id="modal-title">Novo Culto</h3>
      <button class="btn-x" id="btn-modal-x">
        <svg><use href="#i-x"/></svg>
      </button>
    </div>

    <div class="mfield">
      <label>Título</label>
      <input id="f-titulo" placeholder="Ex: Culto Domingo Manhã"/>
    </div>
    <div class="mrow">
      <div class="mfield"><label>Data</label><input type="date" id="f-data"/></div>
      <div class="mfield"><label>Horário</label><input type="time" id="f-horario" value="09:00"/></div>
    </div>
    <div class="mrow">
      <div class="mfield">
        <label>Tipo</label>
        <select id="f-tipo">
          <option value="culto">Culto Regular</option>
          <option value="especial">Culto Especial</option>
          <option value="conferencia">Conferência</option>
          <option value="oracao">Culto de Oração</option>
        </select>
      </div>
      <div class="mfield">
        <label>Cor</label>
        <select id="f-cor">
          <option value="#0A84FF">Azul</option>
          <option value="#5E5CE6">Roxo</option>
          <option value="#30D158">Verde</option>
          <option value="#FF9F0A">Laranja</option>
          <option value="#FF453A">Vermelho</option>
          <option value="#FF375F">Rosa</option>
        </select>
      </div>
    </div>
    <div class="mfield"><label>Descrição</label><input id="f-descricao" placeholder="Opcional"/></div>

    <hr class="modal-sep"/>
    <div class="modal-sec-title">Equipe de Ministério</div>
    <div class="ef-list" id="ef-list"></div>

    <button class="btn-save" id="btn-save">
      <svg><use href="#i-check"/></svg> Salvar Culto
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     DELETE CONFIRM
══════════════════════════════════════════ -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-ico">
      <svg style="stroke:var(--red)"><use href="#i-trash"/></svg>
    </div>
    <h3>Apagar culto?</h3>
    <p id="confirm-msg">Esta ação não pode ser desfeita.</p>
    <div class="confirm-actions">
      <button class="btn-cancel"      id="btn-del-cancel">Cancelar</button>
      <button class="btn-confirm-del" id="btn-del-confirm">Apagar</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════ -->
<script>
/* ── Supabase ── */
const SB_URL = 'https://qihnrltjjpfirsgtfvtr.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFpaG5ybHRqanBmaXJzZ3RmdnRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDI2NDMsImV4cCI6MjA4ODIxODY0M30.dS5raMLod4ktt33R_u3EEqZfYM25L1Vp-RBy0eaaj5k';
const sb = supabase.createClient(SB_URL, SB_KEY);

/* ── Config ── */
const FUNCOES = [
  { key:'dirigente',     label:'Dirigente',      ico:'i-mic',      cls:'fi-dirigente'     },
  { key:'pregador',      label:'Pregador(a)',     ico:'i-book',     cls:'fi-pregador'      },
  { key:'louvor',        label:'Louvor',          ico:'i-music',    cls:'fi-louvor'        },
  { key:'acolhimento',   label:'Acolhimento',     ico:'i-hand',     cls:'fi-acolhimento'   },
  { key:'projecao_live', label:'Projeção / Live', ico:'i-monitor',  cls:'fi-projecao_live' },
  { key:'marketing',     label:'Marketing',       ico:'i-camera',   cls:'fi-marketing'     },
  { key:'kids',          label:'Kids',            ico:'i-smile',    cls:'fi-kids'          },
  { key:'tecnica',       label:'Técnica',         ico:'i-settings', cls:'fi-tecnica'       },
];
const MONTHS  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const WDS     = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const TYPE_LBL= { culto:'Culto Regular', especial:'Culto Especial', conferencia:'Conferência', oracao:'Culto de Oração' };

/* ── State ── */
let cultos      = [];
let calMonth    = new Date(); calMonth.setDate(1);
let isAdmin     = false;
let editingId   = null;
let curCulto    = null;
let delTarget   = null;

/* ── Helpers ── */
const $   = id  => document.getElementById(id);
const toYMD = d => d.toISOString().slice(0,10);
const todayStr  = () => toYMD(new Date());

function fmtDate(ds) {
  return new Date(ds + 'T00:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'});
}
function fmtTime(t) { return t ? t.slice(0,5) : ''; }

function weekOf(d) {
  const r = new Date(d), day = r.getDay();
  const s = new Date(r); s.setDate(r.getDate() - day);
  const e = new Date(r); e.setDate(r.getDate() + (6 - day));
  return { start: toYMD(s), end: toYMD(e) };
}

function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function icon(id, size = 16) {
  return `<svg style="width:${size}px;height:${size}px" aria-hidden="true"><use href="#${id}"/></svg>`;
}

/* ── Screen switching (BUG FIX: single clean function) ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => {
    el.classList.toggle('hidden', el.id !== 'screen-' + id);
  });
}

/* ══════════════════════════════════════════
   AUTH
══════════════════════════════════════════ */
async function boot() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) applyAdmin(session.user);
  await loadCultos();
  showScreen('main');
}

function applyAdmin(user) {
  isAdmin = true;
  $('admin-badge').classList.remove('hidden');
  $('fab').classList.add('show');
  $('pnl-out').classList.add('hidden');
  $('pnl-in').classList.remove('hidden');
  $('pnl-email').textContent = user.email;
  // update icon to shield
  $('btn-open-panel').querySelector('use').setAttribute('href', '#i-shield');
}

function clearAdmin() {
  isAdmin = false;
  $('admin-badge').classList.add('hidden');
  $('fab').classList.remove('show');
  $('admin-detail-bar').classList.add('hidden');
  $('pnl-out').classList.remove('hidden');
  $('pnl-in').classList.add('hidden');
  $('btn-open-panel').querySelector('use').setAttribute('href', '#i-user');
}

/* Panel open/close */
$('btn-open-panel').addEventListener('click', () => $('panel-overlay').classList.add('open'));
$('panel-overlay').addEventListener('click', e => {
  if (e.target === $('panel-overlay')) $('panel-overlay').classList.remove('open');
});

/* Login */
$('btn-login').addEventListener('click', async () => {
  const email = $('l-email').value.trim();
  const pass  = $('l-pass').value;
  $('login-err').textContent = '';
  if (!email || !pass) { $('login-err').textContent = 'Preencha e-mail e senha.'; return; }

  const btn = $('btn-login');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });

  btn.disabled = false;
  btn.innerHTML = icon('i-login', 16) + ' Entrar';

  if (error) { $('login-err').textContent = 'E-mail ou senha incorretos.'; return; }

  applyAdmin(data.user);
  $('panel-overlay').classList.remove('open');
  // show admin bar if we're on detail screen
  if (curCulto) $('admin-detail-bar').classList.remove('hidden');
  toast('✓ Modo admin ativado');
});

$('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-login').click(); });

/* Logout */
$('btn-logout').addEventListener('click', async () => {
  await sb.auth.signOut();
  clearAdmin();
  $('panel-overlay').classList.remove('open');
  toast('Sessão encerrada');
});

/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
async function loadCultos() {
  // Show loading state
  $('events-list').innerHTML = '<div class="loading-wrap"><div class="spin"></div></div>';

  const { data, error } = await sb
    .from('cultos')
    .select('*, escalas(*)')
    .order('data')
    .order('horario');

  if (error) {
    // Log the real error message (fix for [object Object])
    console.error('Supabase error — código:', error.code);
    console.error('Supabase error — mensagem:', error.message);
    console.error('Supabase error — detalhes:', error.details);
    console.error('Objeto completo:', JSON.stringify(error));

    // Show friendly error in the UI
    $('events-list').innerHTML = `
      <div class="empty-state">
        <svg style="width:36px;height:36px;stroke:var(--red);opacity:.7"><use href="#i-x"/></svg>
        <p style="color:var(--red);font-weight:600">Erro ao carregar dados</p>
        <p style="font-size:12px;color:var(--text3)">${error.message || 'Verifique as políticas RLS no Supabase'}</p>
        <button onclick="loadCultos()" style="margin-top:8px;padding:9px 18px;border-radius:10px;background:var(--blue);border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">
          Tentar novamente
        </button>
      </div>`;
    return;
  }

  cultos = data || [];
  renderCalendar();
  renderWeekEvents(new Date());
}

/* ══════════════════════════════════════════
   CALENDAR
══════════════════════════════════════════ */
function renderCalendar() {
  const y = calMonth.getFullYear();
  const m = calMonth.getMonth();
  $('cal-label').textContent = MONTHS[m] + ' ' + y;
  $('cal-wd').innerHTML = WDS.map(d => `<div class="cal-wd">${d}</div>`).join('');

  const firstWD  = new Date(y, m, 1).getDay();
  const dInMonth = new Date(y, m + 1, 0).getDate();
  const prevDays = new Date(y, m, 0).getDate();
  const td       = todayStr();

  // map events by date
  const evMap = {};
  cultos.forEach(c => { (evMap[c.data] || (evMap[c.data] = [])).push(c); });

  let html = '';

  // padding days from previous month
  for (let i = firstWD - 1; i >= 0; i--)
    html += `<div class="cal-day other"><span class="cal-num">${prevDays - i}</span></div>`;

  // current month days
  for (let d = 1; d <= dInMonth; d++) {
    const ds  = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const evs = evMap[ds] || [];
    const isT = ds === td;
    const hasE= evs.length > 0;
    const dots = evs.slice(0, 3).map(e =>
      `<div class="cal-dot" style="background:${e.cor || '#0A84FF'}"></div>`
    ).join('');

    html += `<div class="cal-day${isT ? ' today' : ''}${hasE ? ' clickable' : ''}"
              ${hasE ? `onclick="dayClick('${ds}')"` : ''}>
               <span class="cal-num">${d}</span>
               ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
             </div>`;
  }

  // padding days for next month
  const rem = (7 - ((firstWD + dInMonth) % 7)) % 7;
  for (let d = 1; d <= rem; d++)
    html += `<div class="cal-day other"><span class="cal-num">${d}</span></div>`;

  $('cal-grid').innerHTML = html;
}

// Exposed globally for inline onclick
window.dayClick = function(ds) {
  const evs = cultos.filter(c => c.data === ds);
  if (evs.length === 1) { openDetail(evs[0]); return; }
  renderWeekEvents(new Date(ds + 'T12:00:00'));
  $('screen-main').querySelector('.scroll-body').scrollTo({ top: 99999, behavior: 'smooth' });
};

$('cal-prev').addEventListener('click', () => {
  calMonth.setMonth(calMonth.getMonth() - 1); renderCalendar();
});
$('cal-next').addEventListener('click', () => {
  calMonth.setMonth(calMonth.getMonth() + 1); renderCalendar();
});

/* ══════════════════════════════════════════
   WEEK EVENTS
══════════════════════════════════════════ */
const TYPE_ICO = { culto:'i-cross', especial:'i-star', conferencia:'i-mic', oracao:'i-book' };

function renderWeekEvents(ref) {
  const { start, end } = weekOf(ref);
  $('ev-sub').textContent = fmtDate(start) + ' – ' + fmtDate(end);

  const evs  = cultos.filter(c => c.data >= start && c.data <= end).slice(0, 4);
  const list = $('events-list');

  if (!evs.length) {
    list.innerHTML = `<div class="empty-state">
      ${icon('i-cal', 36)}
      <p>Nenhum culto esta semana</p>
    </div>`;
    return;
  }

  list.innerHTML = evs.map((c, i) => {
    const cor = c.cor || '#0A84FF';
    const ico = TYPE_ICO[c.tipo] || 'i-star';
    // BUG FIX: hex color backgrounds with manual alpha, no color-mix()
    const bg  = cor + '30'; // hex + alpha ~18%
    const br  = cor + '50'; // hex + alpha ~30%
    return `<div class="glass event-card" style="--ac:${cor};animation-delay:${i * .08}s"
                 onclick="openDetail(cultos.find(x=>x.id==='${c.id}'))">
      <div class="ev-icon" style="background:${bg};border:1px solid ${br}">
        <svg style="stroke:${cor};width:20px;height:20px"><use href="#${ico}"/></svg>
      </div>
      <div class="ev-info">
        <div class="ev-title">${c.titulo}</div>
        <div class="ev-meta">
          <span class="ev-pill">${icon('i-cal',9)} ${fmtDate(c.data)}</span>
          <span class="ev-pill">${icon('i-clock',9)} ${fmtTime(c.horario)}</span>
        </div>
      </div>
      <div class="ev-chev" style="color:var(--text3)">${icon('i-chev-r',15)}</div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   DETAIL
══════════════════════════════════════════ */
window.openDetail = function(culto) {
  if (!culto) return;
  curCulto = culto;
  const cor = culto.cor || '#0A84FF';
  const bg  = cor + '25';
  const br  = cor + '45';

  $('detail-topbar-title').textContent = culto.titulo;

  // hero
  const hero = $('detail-hero');
  hero.style.setProperty('--hc', cor);
  hero.innerHTML = `
    <div class="hero-type" style="background:${bg};border-color:${br};color:${cor}">
      ${icon('i-cross', 11)} ${TYPE_LBL[culto.tipo] || culto.tipo}
    </div>
    <div class="hero-title">${culto.titulo}</div>
    ${culto.descricao ? `<div class="hero-desc">${culto.descricao}</div>` : ''}
    <div class="hero-chips">
      <div class="hero-chip">${icon('i-cal',13)} ${fmtDate(culto.data)}</div>
      <div class="hero-chip">${icon('i-clock',13)} ${fmtTime(culto.horario)}</div>
    </div>`;

  // escala
  buildEscalaView(culto);

  // admin controls (BUG FIX: only show if already logged in)
  $('admin-detail-bar').classList.toggle('hidden', !isAdmin);

  showScreen('detail');
  $('screen-detail').querySelector('.scroll-body').scrollTo({ top: 0, behavior: 'instant' });
};

function buildEscalaView(culto) {
  const map = {};
  (culto.escalas || []).forEach(e => { map[e.funcao] = e.pessoa_nome; });

  const rows = FUNCOES.map(f => `
    <div class="escala-row">
      <div class="escala-ico ${f.cls}">
        <svg><use href="#${f.ico}"/></svg>
      </div>
      <div class="escala-texts">
        <div class="escala-label">${f.label}</div>
        ${map[f.key]
          ? `<div class="escala-name">${map[f.key]}</div>`
          : `<div class="escala-empty">A definir</div>`}
      </div>
    </div>`).join('');

  $('detail-escala').innerHTML = `<h2>Equipe de Ministério</h2><div class="escala-list">${rows}</div>`;
}

$('btn-back').addEventListener('click', () => {
  curCulto = null;
  showScreen('main');
});

/* Admin: edit */
$('btn-edit-detail').addEventListener('click', () => {
  if (curCulto) openModal(curCulto);
});

/* Admin: delete — open confirm */
$('btn-del-detail').addEventListener('click', () => {
  if (!curCulto) return;
  delTarget = curCulto;
  $('confirm-msg').textContent = `"${curCulto.titulo}" será apagado permanentemente.`;
  $('confirm-overlay').classList.add('open');
});

$('btn-del-cancel').addEventListener('click', () => {
  $('confirm-overlay').classList.remove('open');
  delTarget = null;
});
$('confirm-overlay').addEventListener('click', e => {
  if (e.target === $('confirm-overlay')) {
    $('confirm-overlay').classList.remove('open');
    delTarget = null;
  }
});

$('btn-del-confirm').addEventListener('click', async () => {
  if (!delTarget) return;
  const btn = $('btn-del-confirm');
  btn.textContent = 'Apagando…'; btn.disabled = true;

  const { error } = await sb.from('cultos').delete().eq('id', delTarget.id);

  btn.textContent = 'Apagar'; btn.disabled = false;
  $('confirm-overlay').classList.remove('open');

  if (error) { toast('Erro ao apagar. Tente novamente.'); return; }

  delTarget = null; curCulto = null;
  await loadCultos();
  showScreen('main');
  toast('Culto apagado');
});

/* ══════════════════════════════════════════
   MODAL ADD / EDIT
══════════════════════════════════════════ */
$('fab').addEventListener('click', () => openModal());
$('btn-modal-x').addEventListener('click', closeModal);
$('modal-overlay').addEventListener('click', e => {
  if (e.target === $('modal-overlay')) closeModal();
});

function closeModal() {
  $('modal-overlay').classList.remove('open');
  editingId = null;
}

function openModal(culto = null) {
  editingId = culto?.id || null;
  $('modal-title').textContent = culto ? 'Editar Culto' : 'Novo Culto';
  $('f-titulo').value    = culto?.titulo    || '';
  $('f-data').value      = culto?.data      || todayStr();
  $('f-horario').value   = (culto?.horario  || '09:00').slice(0, 5);
  $('f-tipo').value      = culto?.tipo      || 'culto';
  $('f-cor').value       = culto?.cor       || '#0A84FF';
  $('f-descricao').value = culto?.descricao || '';

  // build escala inputs
  const map = {};
  (culto?.escalas || []).forEach(e => { map[e.funcao] = e.pessoa_nome; });

  $('ef-list').innerHTML = FUNCOES.map(f => `
    <div class="ef-row">
      <div class="ef-ico ${f.cls}"><svg><use href="#${f.ico}"/></svg></div>
      <div class="ef-lbl">${f.label}</div>
      <input id="ef-${f.key}" placeholder="Nome da pessoa" value="${map[f.key] || ''}"/>
    </div>`).join('');

  $('modal-overlay').classList.add('open');
}

$('btn-save').addEventListener('click', async () => {
  const titulo  = $('f-titulo').value.trim();
  const data    = $('f-data').value;
  const horario = $('f-horario').value;
  const tipo    = $('f-tipo').value;
  const cor     = $('f-cor').value;
  const desc    = $('f-descricao').value.trim();

  if (!titulo || !data) { toast('Preencha título e data'); return; }

  const btn = $('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>';

  let cultoId = editingId;

  if (editingId) {
    const { error } = await sb.from('cultos')
      .update({ titulo, data, horario, tipo, cor, descricao: desc, updated_at: new Date().toISOString() })
      .eq('id', editingId);
    if (error) { toast('Erro ao atualizar.'); btn.disabled=false; btn.innerHTML=icon('i-check')+'Salvar Culto'; return; }
    await sb.from('escalas').delete().eq('culto_id', editingId);
  } else {
    const { data: row, error } = await sb.from('cultos')
      .insert({ titulo, data, horario, tipo, cor, descricao: desc })
      .select().single();
    if (error) { toast('Erro ao criar culto.'); btn.disabled=false; btn.innerHTML=icon('i-check')+'Salvar Culto'; return; }
    cultoId = row.id;
  }

  // insert escala
  const ins = FUNCOES
    .map(f => ({ culto_id: cultoId, funcao: f.key, pessoa_nome: ($('ef-' + f.key)?.value.trim() || '') }))
    .filter(e => e.pessoa_nome);
  if (ins.length) await sb.from('escalas').insert(ins);

  btn.disabled = false;
  btn.innerHTML = icon('i-check', 16) + ' Salvar Culto';
  closeModal();

  await loadCultos();
  toast(editingId ? 'Culto atualizado ✓' : 'Culto criado ✓');

  // refresh detail if we were editing the current one
  if (editingId) {
    const updated = cultos.find(c => c.id === editingId);
    if (updated) openDetail(updated);
  }
});

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
boot();
</script>
